syntax = "proto3";

package mini_reco.ad;

option java_package = "com.interview.minireco.proto.ad";
option java_multiple_files = true;
option java_outer_classname = "AdRecallProto";

message AdExtensionPb {
  string extension_name = 1;
  string extension_value = 2;
}

message AdRecallItemPb {
  int64 creative_id = 1;
  int64 promoted_goods_id = 2;
  string copywriting = 3;
  string industry = 4;
  int64 score_micros = 5;
  repeated AdExtensionPb extensions = 6;
}

message AdRecallResponsePb {
  repeated AdRecallItemPb items = 1;
}
