syntax = "proto3";

package mini_reco.goods;

option java_package = "com.interview.minireco.proto.goods";
option java_multiple_files = true;
option java_outer_classname = "GoodsRecallProto";

message GoodsAttributePb {
  string name = 1;
  string value = 2;
}

message GoodsRecallItemPb {
  int64 goods_id = 1;
  string goods_title = 2;
  string category = 3;
  double relevance_score = 4;
  repeated GoodsAttributePb attributes = 5;
}

message GoodsRecallResponsePb {
  repeated GoodsRecallItemPb items = 1;
}

message GoodsRecallRequestPb {
  int64 user_id = 1;
  string preferred_category = 2;
  string scene = 3;
}

service GoodsRecallRpc {
  rpc Recall(GoodsRecallRequestPb) returns (GoodsRecallResponsePb);
}
