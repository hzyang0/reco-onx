syntax = "proto3";

package mini_reco.live;

option java_package = "com.interview.minireco.proto.live";
option java_multiple_files = true;
option java_outer_classname = "LiveRecallProto";

message LiveFeaturePb {
  string feature_key = 1;
  string feature_value = 2;
}

message LiveRecallItemPb {
  int64 room_id = 1;
  int64 product_id = 2;
  string room_title = 3;
  string product_category = 4;
  float prediction_score = 5;
  repeated LiveFeaturePb features = 6;
}

message LiveRecallResponsePb {
  repeated LiveRecallItemPb items = 1;
}

message LiveRecallRequestPb {
  int64 user_id = 1;
  string preferred_category = 2;
  string scene = 3;
}

service LiveRecallRpc {
  rpc Recall(LiveRecallRequestPb) returns (LiveRecallResponsePb);
}
