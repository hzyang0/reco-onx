apiVersion: apps/v1
kind: Deployment
metadata:
  name: goods
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: goods
  template:
    metadata:
      labels:
        app.kubernetes.io/name: goods
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: goods
          image: mini-reco-access-layer:v17
          imagePullPolicy: IfNotPresent
          args: ["-cp", "/app/app.jar", "com.interview.minireco.grpc.server.DownstreamGrpcApplication", "goods", "19001", "19101"]
          envFrom:
            - configMapRef:
                name: mini-reco-config
          env:
            - name: OTEL_SERVICE_NAME
              value: mini-reco-goods
          ports:
            - name: grpc
              containerPort: 19001
            - name: metrics
              containerPort: 19101
          startupProbe:
            grpc:
              port: 19001
              service: mini_reco.goods.GoodsRecallRpc
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            grpc:
              port: 19001
              service: mini_reco.goods.GoodsRecallRpc
            periodSeconds: 3
            timeoutSeconds: 2
          livenessProbe:
            grpc:
              port: 19001
              service: mini_reco.goods.GoodsRecallRpc
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: goods
  labels:
    monitoring: prometheus
spec:
  selector:
    app.kubernetes.io/name: goods
  ports:
    - name: grpc
      port: 19001
      targetPort: grpc
    - name: metrics
      port: 19101
      targetPort: metrics
---
