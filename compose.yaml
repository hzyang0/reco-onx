name: mini-reco-v22

x-app: &app
  image: mini-reco-access-layer:v22
  build:
    context: .
    args:
      RUNTIME_IMAGE: ${MINI_RECO_RUNTIME_IMAGE:-eclipse-temurin:17-jre-jammy}
  init: true
  read_only: true
  tmpfs:
    - /tmp:size=64m
  networks:
    - reco

x-otel: &otel
  OTEL_SDK_DISABLED: "false"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://trace-collector:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_TRACES_EXPORTER: otlp
  OTEL_METRICS_EXPORTER: none
  OTEL_LOGS_EXPORTER: none
  OTEL_BSP_SCHEDULE_DELAY: "200"
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=compose,service.version=v22

services:
  config-data-init:
    image: mini-reco-access-layer:v22
    profiles:
      - dynamic
    user: "0:0"
    entrypoint: ["sh", "-c"]
    command: ["chown 65532:65532 /data"]
    read_only: true
    volumes:
      - config-data:/data
    networks:
      - reco

  redis:
    image: redis:7-alpine
    profiles:
      - cache
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20
    networks:
      - reco
    mem_limit: 192m
    cpus: 0.35

  config-center:
    <<: *app
    profiles:
      - dynamic
    command:
      - -cp
      - /app/app.jar
      - com.interview.minireco.config.ConfigCenterApplication
      - "8888"
    environment:
      CONFIG_STORE_PATH: /data/config-journal.jsonl
      ADMIN_RELEASE_KEY_ID: ${ADMIN_RELEASE_KEY_ID:-}
      ADMIN_RELEASE_SECRET: ${ADMIN_RELEASE_SECRET:-}
      ADMIN_OPS_KEY_ID: ${ADMIN_OPS_KEY_ID:-}
      ADMIN_OPS_SECRET: ${ADMIN_OPS_SECRET:-}
      ADMIN_AUTH_MAX_SKEW_SECONDS: ${ADMIN_AUTH_MAX_SKEW_SECONDS:-60}
    volumes:
      - config-data:/data
    depends_on:
      config-data-init:
        condition: service_completed_successfully
    ports:
      - "18888:8888"
    healthcheck:
      test:
        - CMD
        - java
        - -cp
        - /app/app.jar
        - com.interview.minireco.ops.HttpHealthProbe
        - http://localhost:8888/health
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 3s
    mem_limit: 192m
    cpus: 0.35

  trace-collector:
    <<: *app
    command:
      - -cp
      - /app/app.jar
      - com.interview.minireco.telemetry.collector.TraceCollectorApplication
      - "4317"
      - "16686"
    ports:
      - "16686:16686"
    healthcheck:
      test:
        - CMD
        - java
        - -cp
        - /app/app.jar
        - com.interview.minireco.ops.HttpHealthProbe
        - http://localhost:16686/health
      interval: 5s
      timeout: 4s
      retries: 20
      start_period: 5s
    mem_limit: 256m
    cpus: 0.50

  goods:
    <<: *app
    command:
      - -cp
      - /app/app.jar
      - com.interview.minireco.grpc.server.DownstreamGrpcApplication
      - goods
      - "19001"
      - "19101"
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: mini-reco-goods
    depends_on:
      trace-collector:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - java
        - -cp
        - /app/app.jar
        - com.interview.minireco.grpc.ops.GrpcHealthProbe
        - localhost:19001
        - mini_reco.goods.GoodsRecallRpc
      interval: 5s
      timeout: 4s
      retries: 20
      start_period: 5s
    mem_limit: 256m
    cpus: 0.50

  live:
    <<: *app
    command:
      - -cp
      - /app/app.jar
      - com.interview.minireco.grpc.server.DownstreamGrpcApplication
      - live
      - "19002"
      - "19102"
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: mini-reco-live
    depends_on:
      trace-collector:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - java
        - -cp
        - /app/app.jar
        - com.interview.minireco.grpc.ops.GrpcHealthProbe
        - localhost:19002
        - mini_reco.live.LiveRecallRpc
      interval: 5s
      timeout: 4s
      retries: 20
      start_period: 5s
    mem_limit: 256m
    cpus: 0.50

  ad:
    <<: *app
    command:
      - -cp
      - /app/app.jar
      - com.interview.minireco.grpc.server.DownstreamGrpcApplication
      - ad
      - "19003"
      - "19103"
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: mini-reco-ad
    depends_on:
      trace-collector:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - java
        - -cp
        - /app/app.jar
        - com.interview.minireco.grpc.ops.GrpcHealthProbe
        - localhost:19003
        - mini_reco.ad.AdRecallRpc
      interval: 5s
      timeout: 4s
      retries: 20
      start_period: 5s
    mem_limit: 256m
    cpus: 0.50

  gateway:
    <<: *app
    command:
      - -jar
      - /app/app.jar
      - "8080"
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: mini-reco-gateway
      RECALL_TRANSPORT: grpc
      GRPC_GOODS_TARGET: goods:19001
      GRPC_LIVE_TARGET: live:19002
      GRPC_AD_TARGET: ad:19003
      GRPC_DEADLINE_MS: ${GRPC_DEADLINE_MS:-70}
      RECALL_TIMEOUT_MS: ${RECALL_TIMEOUT_MS:-80}
      RECALL_FANOUT_TIMEOUT_MS: ${RECALL_FANOUT_TIMEOUT_MS:-120}
      CONFIG_CENTER_URL: ${CONFIG_CENTER_URL:-}
      CONFIG_POLL_INTERVAL_MS: "500"
      CONFIG_STALE_AFTER_MS: "3000"
      REDIS_URL: ${REDIS_URL:-}
      FEATURE_CACHE_TTL_SECONDS: "60"
      FEATURE_CACHE_TTL_JITTER_SECONDS: "15"
      FEATURE_CACHE_NULL_TTL_SECONDS: "10"
      ADMIN_RELEASE_KEY_ID: ${ADMIN_RELEASE_KEY_ID:-}
      ADMIN_RELEASE_SECRET: ${ADMIN_RELEASE_SECRET:-}
      ADMIN_OPS_KEY_ID: ${ADMIN_OPS_KEY_ID:-}
      ADMIN_OPS_SECRET: ${ADMIN_OPS_SECRET:-}
      ADMIN_AUTH_MAX_SKEW_SECONDS: ${ADMIN_AUTH_MAX_SKEW_SECONDS:-60}
    depends_on:
      goods:
        condition: service_healthy
      live:
        condition: service_healthy
      ad:
        condition: service_healthy
    ports:
      - "18093:8080"
    healthcheck:
      test:
        - CMD
        - java
        - -cp
        - /app/app.jar
        - com.interview.minireco.ops.HttpHealthProbe
        - http://localhost:8080/health
      interval: 5s
      timeout: 4s
      retries: 20
      start_period: 5s
    mem_limit: 384m
    cpus: 1.00

  prometheus:
    image: prom/prometheus:v2.50.0
    profiles:
      - monitoring
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=2h
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "19090:9090"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - --quiet
        - http://localhost:9090/-/ready
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 3s
    networks:
      - reco
    mem_limit: 384m
    cpus: 0.75

  grafana:
    image: grafana/grafana:10.4.2
    profiles:
      - monitoring
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_DEFAULT_THEME: light
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/mini-reco-overview.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "13000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - --quiet
        - http://localhost:3000/api/health
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - reco
    mem_limit: 384m
    cpus: 0.75

networks:
  reco:
    driver: bridge

volumes:
  config-data:
  prometheus-data:
  grafana-data:
